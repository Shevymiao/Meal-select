<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b0f17" />
  <title>AI Casino 餐點輪盤</title>

  <style>
    :root{
      --bg:#0b0f17;
      --card:rgba(255,255,255,0.06);
      --stroke:rgba(255,255,255,0.14);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,0.75);
      --accent:#ff3b30;
      --accent2:#34c759;
      --accent3:#007aff;
      --shadow: 0 14px 40px rgba(0,0,0,0.55);
      --radius:18px;
      --wheel: min(86vw, 420px);
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBot: env(safe-area-inset-bottom, 0px);
      --safeL: env(safe-area-inset-left, 0px);
      --safeR: env(safe-area-inset-right, 0px);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 50% -150px, rgba(0,122,255,0.18), transparent 70%),
                  radial-gradient(900px 600px at 85% 15%, rgba(52,199,89,0.12), transparent 70%),
                  radial-gradient(900px 600px at 10% 35%, rgba(255,59,48,0.10), transparent 70%),
                  var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, -apple-system, system-ui, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      padding: calc(14px + var(--safeTop)) calc(14px + var(--safeR)) calc(14px + var(--safeBot)) calc(14px + var(--safeL));
      display:flex;
      justify-content:center;
    }

    .app{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 0;
    }

    .title h1{
      margin:0;
      font-size:18px;
      letter-spacing:0.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .title .sub{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .pill{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,0.16);
      border-radius: 14px;
      padding:8px;
    }

    .seg{
      display:flex;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding:4px;
      gap:4px;
    }
    .seg button{
      border:0;
      background: transparent;
      color: rgba(234,240,255,0.75);
      padding:8px 10px;
      border-radius: 12px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }
    .seg button.active{
      background: rgba(0,122,255,0.22);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(0,122,255,0.25);
    }

    .btn{
      border:0;
      border-radius: 16px;
      padding:12px 14px;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      color:white;
      background: linear-gradient(180deg, rgba(255,59,48,1), rgba(255,59,48,0.85));
      box-shadow: 0 12px 28px rgba(255,59,48,0.22);
    }
    .btn:disabled{ opacity:0.55; cursor:not-allowed; }

    .btn.secondary{
      background: rgba(255,255,255,0.10);
      box-shadow: none;
      color: var(--text);
      border: 1px solid var(--stroke);
      font-weight:800;
    }

    .main{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:flex-start;
    }

    .panel{
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding:12px;
    }

    .wheelPanel{
      width: calc(var(--wheel) + 24px);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .pointerWrap{
      width: calc(var(--wheel) + 24px);
      display:flex;
      justify-content:center;
      margin-top:4px;
      position:relative;
      height: 20px;
    }
    .pointer{
      width:0; height:0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 24px solid #ffcc00;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
      transform: translateY(-2px);
    }

    canvas{
      width: var(--wheel);
      height: var(--wheel);
      display:block;
    }

    .result{
      width: min(520px, 100%);
      border:1px solid rgba(255,204,0,0.35);
      background: rgba(255,204,0,0.10);
      border-radius: 16px;
      padding:10px 12px;
      text-align:left;
      line-height:1.35;
    }
    .result .picked{
      font-size:18px;
      font-weight:1000;
      margin:0 0 6px 0;
    }
    .result .advice{
      font-size:13px;
      color: rgba(234,240,255,0.88);
      margin:0;
    }

    .metaRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      width:100%;
    }

    .toggle{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius: 16px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,0.14);
      user-select:none;
    }
    .toggle input{ transform: scale(1.15); }

    .editPanel{
      width: min(520px, 100%);
    }

    .editHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .editHeader h2{
      margin:0;
      font-size:14px;
      letter-spacing:0.2px;
      color: rgba(234,240,255,0.92);
    }

    .list{
      max-height: 360px;
      overflow:auto;
      border:1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding:8px;
      background: rgba(0,0,0,0.16);
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
      padding:8px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .row:last-child{ border-bottom:0; }
    .name{
      flex: 1;
      text-align:left;
      font-size:13px;
      font-weight:800;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .tag{
      font-size:12px;
      font-weight:900;
      padding:6px 8px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(234,240,255,0.88);
      min-width: 84px;
      text-align:center;
    }
    .miniBtn{
      border:0;
      border-radius: 12px;
      padding:8px 10px;
      font-weight:900;
      cursor:pointer;
      background: rgba(255,255,255,0.10);
      color: var(--text);
      border:1px solid rgba(255,255,255,0.14);
    }

    .form{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .input, .select{
      background: rgba(0,0,0,0.18);
      border:1px solid rgba(255,255,255,0.14);
      color: var(--text);
      border-radius: 14px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    .input{ flex: 1; min-width: 220px; }
    .select{ min-width: 120px; }

    .footNote{
      margin-top:10px;
      font-size:12px;
      color: rgba(234,240,255,0.70);
      text-align:left;
      line-height:1.45;
    }

    @media (max-width: 920px){
      .editPanel{ width: min(560px, 100%); }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <h1>AI Casino 餐點輪盤</h1>
        <div class="sub" id="subtitle">同一個大轉盤，依你的「今天狀態」自動加權</div>
      </div>

      <div class="pill">
        <div class="seg" role="tablist" aria-label="day type">
          <button id="seg-train" class="active" type="button">訓練日</button>
          <button id="seg-diet" type="button">減脂日</button>
          <button id="seg-lowcarb" type="button">低碳晚餐</button>
        </div>
        <button class="btn secondary" id="editToggle" type="button">編輯</button>
      </div>
    </div>

    <div class="main">
      <div class="panel wheelPanel">
        <div class="pointerWrap"><div class="pointer" aria-hidden="true"></div></div>
        <canvas id="wheel" width="900" height="900" aria-label="roulette wheel"></canvas>

        <div class="metaRow">
          <button class="btn" id="spinBtn" type="button">SPIN</button>

          <label class="toggle">
            <input id="soundOn" type="checkbox" checked />
            <span style="font-weight:900;font-size:13px;">音效</span>
          </label>

          <label class="toggle">
            <input id="noRepeat" type="checkbox" />
            <span style="font-weight:900;font-size:13px;">抽到就暫時降權</span>
          </label>
        </div>

        <div class="result" aria-live="polite">
          <p class="picked" id="pickedText">尚未抽籤</p>
          <p class="advice" id="adviceText">選好今天狀態後按 SPIN，你會得到餐點與調整建議</p>
        </div>
      </div>

      <div class="panel editPanel" id="editPanel" style="display:none;">
        <div class="editHeader">
          <h2>餐點選項</h2>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="miniBtn" id="resetBtn" type="button">重置預設</button>
            <button class="miniBtn" id="closeEdit" type="button">關閉</button>
          </div>
        </div>

        <div class="list" id="list"></div>

        <div class="form">
          <input class="input" id="newName" placeholder="新增餐點，例如：清蒸鱸魚＋地瓜＋青菜" />
          <select class="select" id="newType" aria-label="type">
            <option value="train">訓練日</option>
            <option value="diet">減脂日</option>
            <option value="lowcarb">低碳晚餐</option>
            <option value="any">通用</option>
          </select>
          <button class="miniBtn" id="addBtn" type="button">新增</button>
        </div>

        <div class="footNote">
          加權規則：你選的日子類別會 ×2。<br>
          AI 權重：抽到的餐點會在接下來 10 次內逐步回復到原權重。<br>
          「抽到就暫時降權」開啟時才會啟用上述 AI 權重。
        </div>
      </div>
    </div>
  </div>

<script>

(() => {
  // =========================
  // V4: Casino roulette physics + ball + smarter AI weighting
  // UI/DOM/CSS unchanged.
  // =========================

  // -------------------------
  // AI weighting model
  // -------------------------
  const RECOVERY_SPINS = 10;    // recover over 10 spins
  const PENALTY_P = 0.60;       // immediately after pick, keep 60% of weight
  const STORAGE_KEY = "ai_meal_roulette_v4";

  const TYPE_LABEL = {
    train: "訓練日",
    diet: "減脂日",
    lowcarb: "低碳晚餐",
    any: "通用"
  };

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  function clamp01(x){ return Math.min(1, Math.max(0, x)); }

  // Logistic recovery: slow-then-fast feel, hits ~1.0 by 10
  function cooldownFactor(c){
    const t = clamp01(c / RECOVERY_SPINS);            // 0..1
    const k = 7.2;                                    // steepness
    const x = (t - 0.5);                              // center at 0.5
    const s = 1 / (1 + Math.exp(-k * x));             // 0..1
    return PENALTY_P + (1 - PENALTY_P) * s;           // PENALTY_P..1
  }

  function normalizeAngle(a){
    const tau = Math.PI * 2;
    a %= tau;
    if(a < 0) a += tau;
    return a;
  }

  // -------------------------
  // Default dataset
  // -------------------------
  const DEFAULT_ITEMS = [
    ["舒肥雞胸肉餐盒（半飯或飯換菜）","train"],
    ["蒜泥豬里肌餐盒（半飯或飯換菜）","diet"],
    ["鹽烤鯖魚餐盒（半飯或飯換菜）","train"],
    ["清滷牛腱餐盒（半飯或飯換菜）","diet"],
    ["香料烤雞腿餐盒（去皮，半飯或飯換菜）","train"],
    ["清蒸鯛魚片餐盒（半飯或飯換菜）","diet"],

    ["清燉牛肉湯（加滷花干）","diet"],
    ["豬肝湯＋兩份燙青菜（青菜不加肉燥）","diet"],
    ["嘴邊肉盤＋燙青菜","diet"],
    ["肝連肉盤＋燙青菜","diet"],
    ["無刺虱目魚肚湯（清湯）＋滷豆腐","diet"],
    ["加熱滷味（豆干＋海帶＋三樣以上蔬菜）","diet"],
    ["鹹水雞（去皮，雞胸＋小黃瓜＋花椰菜＋木耳）","diet"],

    ["個人小火鍋（昆布底，低脂牛＋蔬菜＋豆腐）","lowcarb"],
    ["個人小火鍋（昆布底，雞肉＋蔬菜＋豆腐）","lowcarb"],
    ["番茄蔬菜燉牛肉","train"],
    ["海鮮豆腐鍋（蝦＋蛤蜊＋豆腐）","lowcarb"],
    ["香菇雞湯（去皮）＋燙青菜","lowcarb"],
    ["麻油雞湯（去皮）＋燙青菜","lowcarb"],

    ["綜合刺身定食（飯減半或改沙拉）","train"],
    ["鹽烤鮮魚定食（竹筴魚或花魚，飯減半）","train"],
    ["烤雞肉串（鹽烤，避開醬燒）","train"],
    ["自選 Poke Bowl（全生菜＋鮪魚＋毛豆＋豆腐）","train"],
    ["自選 Poke Bowl（全生菜＋燻雞＋毛豆＋豆腐）","train"],

    ["雞肉藜麥碗","train"],
    ["烤雞沙拉","diet"],
    ["鯖魚定食","train"],
    ["清蒸鱸魚＋地瓜＋燙青菜","train"],
    ["牛排＋烤蔬菜（訓練日更適合）","train"],
    ["雞胸肉＋燙青菜","diet"],
    ["蒸蛋＋燙青菜","lowcarb"],
    ["豆腐鍋","lowcarb"],
    ["無糖豆漿＋茶葉蛋","diet"],
    ["無糖優格＋水果＋燕麥（份量控制）","any"]
  ];

  function buildDefault(){
    return DEFAULT_ITEMS.map(([name,type]) => ({
      id: uid(),
      name,
      type,
      baseW: 1,
      cooldown: RECOVERY_SPINS
    }));
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if(!obj || !Array.isArray(obj.items)) return null;
      return obj;
    }catch(e){
      return null;
    }
  }

  // -------------------------
  // UI elements (keep unchanged)
  // -------------------------
  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");

  const spinBtn = document.getElementById("spinBtn");
  const pickedText = document.getElementById("pickedText");
  const adviceText = document.getElementById("adviceText");

  const segTrain = document.getElementById("seg-train");
  const segDiet = document.getElementById("seg-diet");
  const segLow = document.getElementById("seg-lowcarb");

  const editToggle = document.getElementById("editToggle");
  const editPanel = document.getElementById("editPanel");
  const closeEdit = document.getElementById("closeEdit");
  const resetBtn = document.getElementById("resetBtn");

  const listEl = document.getElementById("list");
  const newName = document.getElementById("newName");
  const newType = document.getElementById("newType");
  const addBtn = document.getElementById("addBtn");

  const soundOn = document.getElementById("soundOn");
  const noRepeat = document.getElementById("noRepeat");

  // -------------------------
  // State
  // -------------------------
  let dayType = "train";
  let items = buildDefault();

  const saved = loadState();
  if(saved){
    if(saved.dayType) dayType = saved.dayType;
    if(Array.isArray(saved.items) && saved.items.length){
      items = saved.items.map(x => ({
        id: x.id || uid(),
        name: String(x.name || "").trim() || "未命名",
        type: (x.type in TYPE_LABEL) ? x.type : "any",
        baseW: Number.isFinite(x.baseW) ? Math.max(1, Math.floor(x.baseW)) : 1,
        cooldown: Number.isFinite(x.cooldown) ? Math.min(RECOVERY_SPINS, Math.max(0, Math.floor(x.cooldown))) : RECOVERY_SPINS
      }));
    }
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      dayType,
      items
    }));
  }

  // -------------------------
  // Audio (WebAudio tick + win)
  // -------------------------
  let audioCtx = null;
  let masterGain = null;

  function ensureAudio(){
    if(!soundOn.checked) return;
    if(audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;
    masterGain.connect(audioCtx.destination);
  }

  function clickSound(intensity){
    if(!soundOn.checked) return;
    ensureAudio();
    if(!audioCtx) return;

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const base = 980 + Math.random()*220;
    osc.type = "square";
    osc.frequency.setValueAtTime(base, now);

    const a = 0.0015;
    const d = 0.028 + 0.05*intensity;

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.22, now + a);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + a + d);

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start(now);
    osc.stop(now + a + d + 0.01);
  }

  function winSound(){
    if(!soundOn.checked) return;
    ensureAudio();
    if(!audioCtx) return;

    const now = audioCtx.currentTime;

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = "sine";
    osc2.type = "triangle";

    osc1.frequency.setValueAtTime(660, now);
    osc1.frequency.exponentialRampToValueAtTime(990, now + 0.12);

    osc2.frequency.setValueAtTime(330, now);
    osc2.frequency.exponentialRampToValueAtTime(495, now + 0.12);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.35, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(masterGain);

    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 0.30);
    osc2.stop(now + 0.30);
  }

  // iOS unlock audio
  document.addEventListener("touchstart", () => {
    ensureAudio();
    if(audioCtx && audioCtx.state === "suspended"){
      audioCtx.resume().catch(()=>{});
    }
  }, { once:true, passive:true });

  // -------------------------
  // Weighting
  // -------------------------
  function dayMultiplier(itemType){
    if(itemType === "any") return 1;
    return (itemType === dayType) ? 2 : 1;
  }

  function effectiveWeight(it){
    const base = it.baseW || 1;
    const dayM = dayMultiplier(it.type);
    const aiM = noRepeat.checked ? cooldownFactor(it.cooldown) : 1;
    return Math.max(0.05, base * dayM * aiM);
  }

  function weightedPickIndex(){
    const weights = items.map(effectiveWeight);
    const sum = weights.reduce((a,b)=>a+b,0);
    let r = Math.random() * sum;
    for(let i=0;i<weights.length;i++){
      r -= weights[i];
      if(r <= 0) return i;
    }
    return weights.length - 1;
  }

  function advanceCooldowns(){
    for(const it of items){
      it.cooldown = Math.min(RECOVERY_SPINS, (it.cooldown ?? RECOVERY_SPINS) + 1);
    }
  }

  function applyPickCooldown(picked){
    picked.cooldown = 0;
  }

  // -------------------------
  // Advice
  // -------------------------
  function adviceFor(picked){
    const pickedType = picked.type;
    const day = dayType;

    if(pickedType === "any"){
      if(day === "train") return "通用餐可接受，你可以再補一個蛋白質小點，例如無糖豆漿或茶葉蛋。";
      if(day === "diet") return "通用餐可接受，你可以把主食減半，並確保有一份蔬菜。";
      return "通用餐可接受，若有主食請減量，並優先補蛋白質與蔬菜。";
    }

    if(pickedType === day){
      if(day === "train") return "匹配訓練日，你可以把碳水放在訓練前後，並確保蛋白質至少一掌心。";
      if(day === "diet") return "匹配減脂日，優先高蛋白與蔬菜，主食半份即可。";
      return "匹配低碳晚餐，避免粉類與甜飲，並補足蛋白質與纖維。";
    }

    if(day === "train"){
      if(pickedType === "lowcarb") return "你選訓練日但抽到偏低碳餐，你可以補半份主食或地瓜，再加無糖豆漿。";
      return "你選訓練日但抽到偏減脂餐，你可以加一個蛋白質單點，並視訓練量補半份主食。";
    }

    if(day === "diet"){
      if(pickedType === "train") return "你選減脂日但抽到偏訓練餐，你可以把主食減半，並避免額外油脂與含糖醬料。";
      return "你選減脂日但抽到偏低碳餐，控熱量更容易，記得補足蛋白質。";
    }

    if(pickedType === "train") return "你選低碳晚餐但抽到偏訓練餐，你可以把飯或澱粉換成生菜，並以蛋白質與蔬菜為主。";
    return "你選低碳晚餐但抽到偏減脂餐仍可接受，請把主食量降到半份或改蔬菜。";
  }

  // -------------------------
  // Segmented control
  // -------------------------
  function setSegActive(){
    segTrain.classList.toggle("active", dayType === "train");
    segDiet.classList.toggle("active", dayType === "diet");
    segLow.classList.toggle("active", dayType === "lowcarb");
    saveState();
    drawWheel();
    renderList();
  }

  segTrain.addEventListener("click", () => { dayType = "train"; setSegActive(); });
  segDiet.addEventListener("click", () => { dayType = "diet"; setSegActive(); });
  segLow.addEventListener("click", () => { dayType = "lowcarb"; setSegActive(); });

  // -------------------------
  // Casino roulette rendering (keep canvas only)
  // -------------------------
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const R = Math.min(W, H) * 0.45;

  // Wheel & ball dynamics
  let wheelAngle = 0;
  let wheelOmega = 0;

  let ballAngle = normalizeAngle(-Math.PI/2);
  let ballOmega = 0;
  let ballRadius = R + 18;

  let spinning = false;

  function drawBall(){
    // Draw on top after wheel
    const x = cx + ballRadius * Math.cos(ballAngle);
    const y = cy + ballRadius * Math.sin(ballAngle);

    ctx.save();
    // shadow
    ctx.beginPath();
    ctx.arc(x+6, y+6, 12, 0, Math.PI*2);
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fill();

    // ball
    const g = ctx.createRadialGradient(x-4, y-4, 2, x, y, 14);
    g.addColorStop(0, "rgba(255,255,255,0.98)");
    g.addColorStop(0.35, "rgba(255,255,255,0.82)");
    g.addColorStop(1, "rgba(180,180,180,0.95)");
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.restore();
  }

  function drawWheel(){
    ctx.clearRect(0,0,W,H);

    const n = items.length;
    if(n === 0){
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0,0,R,0,Math.PI*2);
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fill();
      ctx.fillStyle = "rgba(234,240,255,0.9)";
      ctx.font = "900 44px -apple-system, system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("名單為空", 0, 0);
      ctx.restore();
      return;
    }

    // Outer glow ring
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    ctx.arc(0,0,R+40,0,Math.PI*2);
    const g0 = ctx.createRadialGradient(0,0,R*0.9, 0,0,R+40);
    g0.addColorStop(0, "rgba(255,215,0,0.08)");
    g0.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g0;
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(wheelAngle);

    // Outer metallic rim
    ctx.beginPath();
    ctx.arc(0,0,R+28,0,Math.PI*2);
    const rim = ctx.createRadialGradient(0,0,R+4, 0,0,R+28);
    rim.addColorStop(0, "rgba(255,255,255,0.22)");
    rim.addColorStop(0.45, "rgba(255,255,255,0.05)");
    rim.addColorStop(1, "rgba(0,0,0,0.55)");
    ctx.fillStyle = rim;
    ctx.fill();

    const step = (Math.PI*2)/n;
    for(let i=0;i<n;i++){
      const a0 = i*step;
      const a1 = a0 + step;

      const isRed = (i % 2 === 0);
      const baseCol = isRed ? "rgba(255,59,48,0.92)" : "rgba(20,200,120,0.88)";
      const darkCol = isRed ? "rgba(140,20,18,0.95)" : "rgba(10,90,55,0.95)";

      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,R,a0,a1,false);
      ctx.closePath();

      const grad = ctx.createRadialGradient(0,0,R*0.08, 0,0,R);
      grad.addColorStop(0, "rgba(255,255,255,0.12)");
      grad.addColorStop(0.35, baseCol);
      grad.addColorStop(1, darkCol);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.lineWidth = 6;
      ctx.stroke();

      // pocket notch ring
      ctx.save();
      ctx.rotate((a0+a1)/2);
      ctx.translate(R*0.86, 0);
      ctx.beginPath();
      ctx.arc(0,0,R*0.065,0,Math.PI*2);
      ctx.fillStyle = "rgba(255,255,255,0.10)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.16)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      // label
      ctx.save();
      ctx.rotate((a0+a1)/2);
      ctx.translate(R*0.62, 0);
      ctx.rotate(Math.PI/2);
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.font = "900 26px -apple-system, system-ui, 'Noto Sans TC'";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const label = items[i].name;
      const maxW = R * 0.58;
      const m = ctx.measureText(label).width;
      const scale = Math.min(1, maxW / Math.max(1,m));
      ctx.scale(scale, scale);
      ctx.fillText(label, 0, 0);
      ctx.restore();
    }

    // Inner felt circle
    ctx.beginPath();
    ctx.arc(0,0,R*0.36,0,Math.PI*2);
    const felt = ctx.createRadialGradient(0,0,R*0.06, 0,0,R*0.36);
    felt.addColorStop(0, "rgba(80,255,140,0.08)");
    felt.addColorStop(0.55, "rgba(0,0,0,0.25)");
    felt.addColorStop(1, "rgba(0,0,0,0.55)");
    ctx.fillStyle = felt;
    ctx.fill();

    // Center cap
    ctx.beginPath();
    ctx.arc(0,0,R*0.16,0,Math.PI*2);
    const cap = ctx.createRadialGradient(0,0,R*0.02, 0,0,R*0.16);
    cap.addColorStop(0, "rgba(255,255,255,0.22)");
    cap.addColorStop(0.4, "rgba(255,255,255,0.08)");
    cap.addColorStop(1, "rgba(0,0,0,0.65)");
    ctx.fillStyle = cap;
    ctx.fill();

    ctx.strokeStyle = "rgba(255,215,0,0.25)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(0,0,R+12,0,Math.PI*2);
    ctx.stroke();

    ctx.restore();

    // pointer highlight line
    ctx.save();
    ctx.translate(cx, cy);
    ctx.strokeStyle = "rgba(255,204,0,0.22)";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, -(R+24));
    ctx.lineTo(0, -(R-12));
    ctx.stroke();
    ctx.restore();

    // ball last
    drawBall();
  }

  function indexFromAngle(angle){
    const n = items.length;
    const step = (Math.PI*2)/n;

    const pointer = normalizeAngle(-Math.PI/2);
    const a = normalizeAngle(angle);
    let local = pointer - a;
    local = normalizeAngle(local);

    return Math.min(n-1, Math.max(0, Math.floor(local / step)));
  }

  // -------------------------
  // V4: Physics-like spin with deterministic landing
  // -------------------------
  function spin(){
    if(spinning) return;
    if(items.length === 0) return;

    ensureAudio();
    if(audioCtx && audioCtx.state === "suspended"){
      audioCtx.resume().catch(()=>{});
    }

    spinning = true;
    spinBtn.disabled = true;

    // AI: advance recovery each spin, then pick weighted winner
    advanceCooldowns();
    const winnerIndex = weightedPickIndex();

    // Compute target wheel angle so pointer lands on winner center
    const n = items.length;
    const step = (Math.PI*2)/n;
    const pointer = normalizeAngle(-Math.PI/2);
    const winnerMid = normalizeAngle((winnerIndex + 0.5) * step);

    // Solve: pointer - finalAngle = winnerMid  => finalAngle = pointer - winnerMid (mod 2pi)
    let baseFinal = pointer - winnerMid;

    // Add turns and micro jitter within pocket
    const turns = 8 + Math.floor(Math.random()*4);      // 8..11
    const micro = (Math.random()-0.5) * step * 0.10;
    const finalAngle = baseFinal + turns * Math.PI*2 + micro;

    // Physics-like envelope (fast start, long coast, crisp settle)
    const startAngle = wheelAngle;
    const totalDelta = finalAngle - startAngle;

    // Wheel parameters
    const duration = 4200 + Math.floor(Math.random()*900);
    const t0 = performance.now();

    // Ball parameters
    const startBallAngle = ballAngle;
    const startBallRadius = R + 22;

    // Make ball run opposite wheel early, then drop into pocket
    const ballTurns = turns + 4 + Math.floor(Math.random()*3); // more turns than wheel
    const ballTargetWorld = normalizeAngle(-Math.PI/2); // top pointer
    const ballTargetAngle = ballTargetWorld;            // ball is in world coords

    let lastTick = 0;

    function easeInOutCubic(x){
      return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2, 3)/2;
    }
    function easeOutQuint(x){
      return 1 - Math.pow(1-x, 5);
    }

    function frame(now){
      const t = (now - t0) / duration;
      const x = Math.min(1, Math.max(0, t));

      // Wheel: long coast + settle
      const coast = easeInOutCubic(Math.min(1, x*0.78));
      const settle = (x > 0.78) ? easeOutQuint((x-0.78)/0.22) : 0;
      const mix = (x <= 0.78) ? coast*0.78 : (0.78 + settle*0.22);

      wheelAngle = startAngle + totalDelta * mix;

      // Tick sound from angular velocity proxy
      const intensity = 1 - x;
      const tickEvery = 18 + 95*(1 - intensity); // ms
      if(soundOn.checked && (now - lastTick) > tickEvery){
        lastTick = now;
        clickSound(intensity);
      }

      // Ball: world coords, spirals inward and aligns to pointer
      const ballPhase = easeOutQuint(x);
      const ballSpin = (ballTurns * Math.PI*2) * (1 - ballPhase); // decays
      // Opposite direction early, then converge
      const rawAngle = startBallAngle - ballSpin;
      // Smoothly converge to pointer at end
      const converge = easeOutQuint(Math.max(0, (x-0.55)/0.45));
      const aNorm = normalizeAngle(rawAngle);
      // shortest angle interpolation to target
      let diff = normalizeAngle(ballTargetAngle - aNorm);
      if(diff > Math.PI) diff -= Math.PI*2;
      ballAngle = normalizeAngle(aNorm + diff * converge);

      // Radius drops into pockets
      ballRadius = startBallRadius - (startBallRadius - (R*0.86)) * easeOutQuint(Math.max(0, (x-0.45)/0.55));

      drawWheel();

      if(x < 1){
        requestAnimationFrame(frame);
      }else{
        // Snap to final and resolve winner
        wheelAngle = finalAngle;
        ballAngle = ballTargetAngle;
        ballRadius = R*0.86;
        drawWheel();

        const idx = indexFromAngle(wheelAngle);
        const picked = items[idx] || items[winnerIndex];
        const finalPicked = items[winnerIndex] || picked;

        if(noRepeat.checked){
          applyPickCooldown(finalPicked);
        }

        pickedText.textContent = finalPicked.name;
        adviceText.textContent = adviceFor(finalPicked);
        winSound();

        saveState();

        spinning = false;
        spinBtn.disabled = false;
        renderList();
      }
    }

    requestAnimationFrame(frame);
  }

  // -------------------------
  // Editor (unchanged UI)
  // -------------------------
  function renderList(){
    listEl.innerHTML = "";
    for(const it of items){
      const row = document.createElement("div");
      row.className = "row";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = it.name;

      const tag = document.createElement("div");
      tag.className = "tag";
      tag.textContent = TYPE_LABEL[it.type] || "通用";

      const del = document.createElement("button");
      del.className = "miniBtn";
      del.textContent = "刪除";
      del.addEventListener("click", () => {
        items = items.filter(x => x.id !== it.id);
        saveState();
        drawWheel();
        renderList();
      });

      const flip = document.createElement("button");
      flip.className = "miniBtn";
      flip.textContent = "類型";
      flip.addEventListener("click", () => {
        const order = ["train","diet","lowcarb","any"];
        const idx = Math.max(0, order.indexOf(it.type));
        it.type = order[(idx + 1) % order.length];
        saveState();
        drawWheel();
        renderList();
      });

      row.appendChild(name);
      row.appendChild(tag);
      row.appendChild(flip);
      row.appendChild(del);
      listEl.appendChild(row);
    }
  }

  function addItem(){
    const name = (newName.value || "").trim();
    const type = newType.value;
    if(!name) return;

    items.unshift({
      id: uid(),
      name,
      type: (type in TYPE_LABEL) ? type : "any",
      baseW: 1,
      cooldown: RECOVERY_SPINS
    });

    newName.value = "";
    saveState();
    drawWheel();
    renderList();
  }

  function resetDefault(){
    items = buildDefault();
    saveState();
    drawWheel();
    renderList();
    pickedText.textContent = "尚未抽籤";
    adviceText.textContent = "選好今天狀態後按 SPIN，你會得到餐點與調整建議";
  }

  spinBtn.addEventListener("click", spin);

  editToggle.addEventListener("click", () => {
    const open = editPanel.style.display !== "none";
    editPanel.style.display = open ? "none" : "block";
    editToggle.textContent = open ? "編輯" : "完成";
    renderList();
  });

  closeEdit.addEventListener("click", () => {
    editPanel.style.display = "none";
    editToggle.textContent = "編輯";
  });

  resetBtn.addEventListener("click", resetDefault);

  addBtn.addEventListener("click", addItem);
  newName.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){ e.preventDefault(); addItem(); }
  });

  // -------------------------
  // Init
  // -------------------------
  setSegActive();
  renderList();
  drawWheel();
  saveState();

})();

</script>
